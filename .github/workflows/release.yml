name: "Build and Release Lume"

on:
  push:
    tags:
      - "v*" # 触发条件：当推送到 GitHub 上的 tag 以 v 开头时（比如 v0.1.0）
  workflow_dispatch: # 允许你在 GitHub Actions 页面手动点击按钮运行

jobs:
  release:
    permissions:
      contents: write # 允许向 Releases 页面上传文件
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: "macos-latest" # Mac 端编译 (M1/arm64)
            args: "--target aarch64-apple-darwin"
          - platform: "windows-latest" # Windows 端编译 (x64)
            args: ""

    runs-on: ${{ matrix.platform }}
    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 设置 Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: 设置 Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          # 如果是 macOS，添加 aarch64 (M1/M2) 的编译目标
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin' || '' }}

      # 自动下载并提取 macOS 版的 PDFium 动态链接库
      - name: 注入 PDFium (macOS)
        if: matrix.platform == 'macos-latest'
        run: |
          curl -L -o pdfium.tgz https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-mac-arm64.tgz
          tar -xzf pdfium.tgz lib/libpdfium.dylib
          mv lib/libpdfium.dylib src-tauri/libpdfium.dylib

      # 自动下载并提取 Windows 版的 PDFium 动态链接库
      - name: 注入 PDFium (Windows)
        if: matrix.platform == 'windows-latest'
        shell: bash
        run: |
          curl -L -o pdfium.tgz https://github.com/bblanchon/pdfium-binaries/releases/latest/download/pdfium-win-x64.tgz
          tar -xzf pdfium.tgz bin/pdfium.dll
          mv bin/pdfium.dll src-tauri/pdfium.dll

      - name: 安装前端依赖
        run: npm install

      - name: 使用 Tauri Action 编译并发布
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: v__VERSION__ # 自动读取 tauri.conf.json 里的 version
          releaseName: "Lume v__VERSION__"
          releaseBody: "Lume 跨平台 PDF 阅读器新版本构建完毕。"
          releaseDraft: true # 发布为草稿，供你确认后再公开发布
          prerelease: false
          args: ${{ matrix.args }}
